services:
  backend:
    build:
      context: ./backend
    container_name: ownerbot-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.prod
    volumes:
      - ./frontend:/app/../frontend
      - sqlite_data:/app/owner_bot.db
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000

volumes:
  sqlite_data:/app/owner_bot.db 
