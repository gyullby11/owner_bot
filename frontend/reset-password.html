<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - 사장봇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/my_styles.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <a href="index.html" class="flex items-center justify-center gap-2 mb-4">
                <div class="w-8 h-8 bg-navy rounded-lg flex items-center justify-center text-sand font-bold text-xl">S</div>
                <span class="text-2xl font-black text-navy">사장봇</span>
            </a>
            <h1 class="text-xl font-bold text-navy">새 비밀번호 설정</h1>
            <p class="text-sm text-gray-500 mt-1">새로운 비밀번호를 입력해주세요</p>
        </div>

        <div id="form-section">
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-1">새 비밀번호</label>
                <input id="new-password" type="password" placeholder="새 비밀번호 입력"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-navy">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-1">비밀번호 확인</label>
                <input id="confirm-password" type="password" placeholder="비밀번호 다시 입력"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-navy">
            </div>
            <p id="message" class="text-sm text-red-500 mb-3 hidden"></p>
            <button onclick="resetPassword()"
                style="width:100%; padding:12px; background-color:#0F1E3F; color:white; font-weight:bold; border-radius:12px; border:none; cursor:pointer; font-size:15px;">
                비밀번호 재설정
            </button>
        </div>

        <div id="success-section" class="hidden text-center">
            <div class="text-4xl mb-4">✅</div>
            <p class="font-bold text-navy mb-2">비밀번호가 재설정됐어요!</p>
            <p class="text-sm text-gray-500 mb-6">새 비밀번호로 로그인해주세요.</p>
            <a href="login.html" class="px-6 py-3 bg-navy text-white font-bold rounded-xl hover:bg-steel transition">
                로그인하기
            </a>
        </div>

        <div id="error-section" class="hidden text-center">
            <div class="text-4xl mb-4">❌</div>
            <p class="font-bold text-red-500 mb-2">유효하지 않은 링크예요</p>
            <p class="text-sm text-gray-500 mb-6">링크가 만료됐거나 이미 사용된 링크예요.</p>
            <a href="forgot-password.html" class="px-6 py-3 bg-navy text-white font-bold rounded-xl hover:bg-steel transition">
                다시 요청하기
            </a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const token = new URLSearchParams(window.location.search).get("token");
        if (!token) {
            document.getElementById("form-section").classList.add("hidden");
            document.getElementById("error-section").classList.remove("hidden");
        }

        async function resetPassword() {
            const newPassword = document.getElementById("new-password").value;
            const confirmPassword = document.getElementById("confirm-password").value;
            const msg = document.getElementById("message");

            if (!newPassword || !confirmPassword) {
                msg.textContent = "비밀번호를 입력해주세요.";
                msg.classList.remove("hidden");
                return;
            }
            if (newPassword !== confirmPassword) {
                msg.textContent = "비밀번호가 일치하지 않아요.";
                msg.classList.remove("hidden");
                return;
            }
            if (newPassword.length < 6) {
                msg.textContent = "비밀번호는 6자 이상이어야 해요.";
                msg.classList.remove("hidden");
                return;
            }

            try {
                await apiRequest(`/auth/password-reset/confirm?token=${token}&new_password=${encodeURIComponent(newPassword)}`, {
                    method: "POST"
                });
                document.getElementById("form-section").classList.add("hidden");
                document.getElementById("success-section").classList.remove("hidden");
            } catch (e) {
                document.getElementById("form-section").classList.add("hidden");
                document.getElementById("error-section").classList.remove("hidden");
            }
        }
    </script>
</body>
</html>
