<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 사장봇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0f1e3f',
                        steel: '#213a56',
                        sand: '#cdaa80',
                        camel: '#997953',
                        cream: '#fcfaf8'
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Apple SD Gothic Neo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/my_styles.css">
</head>
<body class="bg-cream text-navy antialiased min-h-screen flex flex-col relative overflow-hidden">

    <div class="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] bg-sand rounded-full mix-blend-multiply filter blur-[100px] opacity-30 -z-10"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-steel rounded-full mix-blend-multiply filter blur-[100px] opacity-20 -z-10"></div>

    <header class="w-full relative z-10 py-6 px-6 lg:px-12 flex justify-center items-center max-w-7xl mx-auto">
        <a href="index.html" class="flex items-center gap-2">
            <div class="w-8 h-8 bg-navy rounded-lg flex items-center justify-center text-sand font-bold text-xl">S</div>
            <span class="text-2xl font-black tracking-tight text-navy">사장봇</span>
        </a>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 pb-20 z-10">
        <div class="glass-card w-full max-w-md p-8 md:p-10 rounded-3xl shadow-xl border border-gray-100 relative">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-black text-navy mb-2">어서오세요, 사장님!</h2>
                <p class="text-steel font-medium">로그인하고 1분 만에 홍보글을 만들어보세요.</p>
            </div>

            <div id="login-form" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-bold text-navy mb-2 ml-1">이메일</label>
                    <input type="email" id="email" placeholder="example@email.com" class="w-full px-5 py-4 rounded-xl border border-gray-300 focus:border-navy focus:ring-2 focus:ring-navy/20 outline-none transition text-lg bg-white/50" />
                </div>
                <div>
                    <label for="password" class="block text-sm font-bold text-navy mb-2 ml-1">비밀번호</label>
                    <input type="password" id="password" placeholder="비밀번호를 입력해주세요" class="w-full px-5 py-4 rounded-xl border border-gray-300 focus:border-navy focus:ring-2 focus:ring-navy/20 outline-none transition text-lg bg-white/50" />
                </div>
                <button onclick="login()" class="w-full bg-navy text-white font-bold text-lg py-4 rounded-xl hover:bg-steel transition shadow-md hover:shadow-lg mt-4 border-b-4 border-steel active:border-b-0 active:translate-y-1">
                    로그인
                </button>
            </div>

            <div id="message" class="mt-4 text-center text-red-500 font-bold text-sm"></div>
            <div class="text-center mt-3">
                <a href="forgot-password.html" class="text-sm text-gray-500 hover:text-navy">비밀번호를 잊으셨나요?</a>
            </div>
            
            <div class="mt-8 text-center border-t border-gray-200 pt-6">
                <p class="text-gray-500">
                    아직 계정이 없으신가요?
                    <a href="register.html" class="text-camel font-bold hover:underline ml-1">회원가입 하기</a>
                </p>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
