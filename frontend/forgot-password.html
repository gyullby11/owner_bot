<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기 - 사장봇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/my_styles.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <a href="index.html" class="flex items-center justify-center gap-2 mb-4">
                <div class="w-8 h-8 bg-navy rounded-lg flex items-center justify-center text-sand font-bold text-xl">S</div>
                <span class="text-2xl font-black text-navy">사장봇</span>
            </a>
            <h1 class="text-xl font-bold text-navy">비밀번호 찾기</h1>
            <p class="text-sm text-gray-500 mt-1">가입한 이메일로 재설정 링크를 보내드려요</p>
        </div>

        <div id="form-section">
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-1">이메일</label>
                <input id="email" type="email" placeholder="가입한 이메일 입력"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-navy">
            </div>
            <p id="message" class="text-sm text-red-500 mb-3 hidden"></p>
            <button onclick="requestReset()"
                style="width:100%; padding:12px; background-color:#0F1E3F; color:white; font-weight:bold; border-radius:12px; border:none; cursor:pointer; font-size:15px;">
                재설정 링크 받기
            </button>
        </div>

        <div id="success-section" class="hidden text-center">
            <div class="text-4xl mb-4">✉️</div>
            <p class="font-bold text-navy mb-2">이메일을 확인해주세요!</p>
            <p class="text-sm text-gray-500">재설정 링크를 발송했어요. 링크는 1시간 동안 유효합니다.</p>
        </div>

        <div class="text-center mt-6">
            <a href="login.html" class="text-sm text-gray-500 hover:text-navy">로그인으로 돌아가기</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        async function requestReset() {
            const email = document.getElementById("email").value.trim();
            const msg = document.getElementById("message");
            const btn = document.querySelector("button[onclick='requestReset()']");

            if (!email) {
                msg.textContent = "이메일을 입력해주세요.";
                msg.classList.remove("hidden");
                return;
            }

            btn.disabled = true;
            btn.textContent = "전송 중...";

            try {
                await apiRequest(`/auth/password-reset/request?email=${encodeURIComponent(email)}`, {
                    method: "POST"
                });
                document.getElementById("form-section").classList.add("hidden");
                document.getElementById("success-section").classList.remove("hidden");
            } catch (e) {
                msg.textContent = e.message || "오류가 발생했습니다.";
                msg.classList.remove("hidden");
                btn.disabled = false;
                btn.textContent = "재설정 링크 받기";
            }
        }
    </script>
</body>
</html>
