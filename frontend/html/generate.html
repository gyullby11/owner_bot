<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>콘텐츠 생성 - 사장봇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0f1e3f',
                        steel: '#213a56',
                        sand: '#cdaa80',
                        camel: '#997953',
                        cream: '#fcfaf8'
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Apple SD Gothic Neo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/css/my_styles.css">
</head>
<body class="bg-cream text-navy antialiased min-h-screen flex flex-col relative overflow-x-hidden">

    <div class="fixed top-[-20%] left-[-10%] w-[500px] h-[500px] bg-sand rounded-full mix-blend-multiply filter blur-[100px] opacity-30 -z-10 pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-steel rounded-full mix-blend-multiply filter blur-[100px] opacity-20 -z-10 pointer-events-none"></div>

    <header class="w-full relative z-10 py-5 px-6 lg:px-8 flex justify-between items-center max-w-[1400px] mx-auto border-b border-gray-200/50">
        <a href="/index.html" class="flex items-center gap-2">
            <div class="w-8 h-8 bg-navy rounded-lg flex items-center justify-center text-sand font-bold text-xl">S</div>
            <span class="text-2xl font-black tracking-tight text-navy">사장봇</span>
        </a>
        <div class="flex gap-4 items-center">
            <div class="hidden md:flex items-center gap-2 bg-white px-4 py-1.5 rounded-full border border-gray-200 shadow-sm mr-2">
                <span class="text-sm font-bold text-gray-500">잔여 크레딧:</span>
                <span class="text-sm font-black text-navy">3회</span>
            </div>
            <a href="/html/mypage.html" class="text-steel font-bold hover:text-navy transition px-4 py-2">마이페이지</a>
        </div>
    </header>

    <main class="flex-grow flex flex-col lg:flex-row gap-6 px-4 lg:px-8 py-8 max-w-[1400px] mx-auto w-full z-10 h-full">

        <section class="w-full lg:w-5/12 flex flex-col gap-4">
            <div class="glass-card p-6 md:p-8 rounded-3xl shadow-lg border border-gray-100 flex-grow">
                <div class="mb-6">
                    <h2 class="text-2xl md:text-3xl font-black text-navy mb-2">콘텐츠 생성</h2>
                    <p class="text-steel font-medium text-sm md:text-base">가게 정보만 입력하면 인공지능이 알아서 글을 써줍니다.</p>
                </div>

                <div class="space-y-5">
                    <div>
                        <label for="shop_name" class="block text-sm font-bold text-navy mb-1.5 ml-1">1. 가게 이름 <span class="text-red-500">*</span></label>
                        <input type="text" id="shop_name" placeholder="예) 강남 김밥천국, 홍대 네일아트" class="w-full px-4 py-3.5 rounded-xl border border-gray-300 focus:border-navy focus:ring-2 focus:ring-navy/20 outline-none transition text-base bg-white/70" />
                    </div>

                    <div>
                        <label for="business_type_select" class="block text-sm font-bold text-navy mb-1.5 ml-1">2. 업종 <span class="text-red-500">*</span></label>
                        <select id="business_type_select" onchange="toggleCustomBusiness()" class="w-full px-4 py-3.5 rounded-xl border border-gray-300 focus:border-navy focus:ring-2 focus:ring-navy/20 outline-none transition text-base bg-white/70 appearance-none">
                            <option value="" disabled selected>업종을 선택해주세요</option>
                            <option value="음식점/식당">음식점 / 식당</option>
                            <option value="카페/베이커리">카페 / 베이커리</option>
                            <option value="피부관리/에스테틱">피부관리 / 에스테틱</option>
                            <option value="헤어샵/미용실">헤어샵 / 미용실</option>
                            <option value="네일아트/속눈썹">네일아트 / 속눈썹</option>
                            <option value="학원/교육">학원 / 교육</option>
                            <option value="헬스/필라테스">헬스 / 필라테스</option>
                            <option value="custom">직접 입력하기</option>
                        </select>
                        <input type="text" id="business_type" placeholder="업종을 직접 입력해주세요" class="hidden w-full px-4 py-3.5 mt-2 rounded-xl border border-gray-300 focus:border-navy focus:ring-2 focus:ring-navy/20 outline-none transition text-base bg-white/70" />
                    </div>

                    <div>
                        <label for="region" class="block text-sm font-bold text-navy mb-1.5 ml-1">3. 지역 <span class="text-red-500">*</span></label>
                        <input type="text" id="region" placeholder="예) 서울 강남구, 김포 장기동" class="w-full px-4 py-3.5 rounded-xl border border-gray-300 focus:border-navy focus:ring-2 focus:ring-navy/20 outline-none transition text-base bg-white/70" />
                    </div>

                    <div>
                        <label for="keyword" class="block text-sm font-bold text-navy mb-1.5 ml-1">4. 노출하고 싶은 키워드 <span class="text-red-500">*</span></label>
                        <input type="text" id="keyword" placeholder="예) 장기동 피부관리, 강남역 맛집" class="w-full px-4 py-3.5 rounded-xl border border-gray-300 focus:border-navy focus:ring-2 focus:ring-navy/20 outline-none transition text-base bg-white/70" />
                    </div>

                    <div>
                        <label for="feature" class="block text-sm font-bold text-navy mb-1.5 ml-1 flex items-center gap-2">
                            5. 우리 가게만의 특징 <span class="bg-sand/30 text-camel px-2 py-0.5 rounded text-xs">선택</span>
                        </label>
                        <input type="text" id="feature" placeholder="👉 입력하면 홍보 효과가 훨씬 좋아져요! (예: 20년 경력, 유기농 재료)" class="w-full px-4 py-3.5 rounded-xl border border-sand focus:border-camel focus:ring-2 focus:ring-camel/20 outline-none transition text-base bg-amber-50/50 placeholder-camel/60 font-medium" />
                    </div>

                    <div>
                        <label for="tone" class="block text-sm font-bold text-navy mb-1.5 ml-1">6. 글의 분위기 (톤)</label>
                        <select id="tone" class="w-full px-4 py-3.5 rounded-xl border border-gray-300 focus:border-navy focus:ring-2 focus:ring-navy/20 outline-none transition text-base bg-white/70 appearance-none">
                            <option value="friendly" selected>😊 친근하고 다정한 느낌</option>
                            <option value="professional">🧐 전문적이고 신뢰감 있는 느낌</option>
                            <option value="emotional">✨ 감성적이고 부드러운 느낌</option>
                        </select>
                    </div>
                </div>

                <button id="generate-btn" onclick="startGeneration()" class="w-full bg-navy text-white font-black text-xl py-4 md:py-5 rounded-2xl hover:bg-steel transition shadow-xl hover:shadow-2xl mt-8 border-b-4 border-steel active:border-b-0 active:translate-y-1 flex items-center justify-center gap-2">
                    <span>마케팅 콘텐츠 생성하기</span>
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </button>
            </div>
        </section>

        <section class="w-full lg:w-7/12 flex flex-col">
            <div id="result-container" class="glass-card p-6 md:p-8 rounded-3xl shadow-lg border border-gray-100 flex-grow flex flex-col relative h-[600px] lg:h-auto min-h-[600px]">

                <div class="flex gap-2 mb-4 overflow-x-auto pb-2 scrollbar-hide border-b border-gray-200">
                    <button onclick="switchUiTab('blog')" id="tab-btn-blog" class="tab-btn active-tab px-6 py-3 rounded-t-xl font-bold text-base whitespace-nowrap transition-all bg-navy text-white">📝 블로그 글</button>
                    <button onclick="switchUiTab('review')" id="tab-btn-review" class="tab-btn px-6 py-3 rounded-t-xl font-bold text-base text-gray-500 hover:bg-gray-100 hover:text-navy whitespace-nowrap transition-all">⭐ 플레이스 리뷰</button>
                    <button onclick="switchUiTab('shorts')" id="tab-btn-shorts" class="tab-btn px-6 py-3 rounded-t-xl font-bold text-base text-gray-500 hover:bg-gray-100 hover:text-navy whitespace-nowrap transition-all">📱 쇼츠 대본</button>
                    <button onclick="switchUiTab('thumbnail')" id="tab-btn-thumbnail" class="tab-btn px-6 py-3 rounded-t-xl font-bold text-base text-gray-500 hover:bg-gray-100 hover:text-navy whitespace-nowrap transition-all">🎨 썸네일 문구</button>
                </div>

                <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-center p-8 bg-white/80 rounded-b-3xl z-10 pt-16">
                    <div class="text-6xl mb-4 opacity-50">🤖</div>
                    <h3 class="text-2xl font-bold text-navy mb-2">사장님을 기다리고 있어요!</h3>
                    <p class="text-gray-500 font-medium">왼쪽 폼을 채우고 [생성하기] 버튼을 누르면<br>1분 만에 놀라운 결과물이 이곳에 나타납니다.</p>
                </div>

                <div id="loading-state" class="hidden absolute inset-0 flex flex-col items-center justify-center text-center p-8 bg-white/90 rounded-b-3xl z-20 pt-16 backdrop-blur-sm">
                    <div class="w-16 h-16 border-4 border-gray-200 border-t-sand rounded-full animate-spin mb-6"></div>
                    <h3 class="text-2xl font-bold text-navy mb-2">열심히 글을 쓰고 있습니다...</h3>
                    <p class="text-camel font-bold">SEO 상위노출 로직 분석 중 🔍</p>
                </div>

                <div id="tab-content" class="flex-grow bg-white rounded-2xl p-6 overflow-y-auto border border-gray-200 text-gray-700 text-lg leading-relaxed whitespace-pre-wrap font-medium shadow-inner"></div>

                <div class="mt-6 flex gap-3">
                    <button id="copy-btn" onclick="copyContent()" disabled class="flex-1 bg-gray-200 text-gray-400 font-bold py-4 rounded-xl transition flex justify-center items-center gap-2 disabled:cursor-not-allowed">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        결과물 복사하기
                    </button>
                    <button id="regen-btn" onclick="startGeneration()" disabled class="flex-none bg-gray-200 text-gray-400 font-bold px-6 py-4 rounded-xl transition disabled:cursor-not-allowed">
                        다시 만들기 🔄
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script src="/js/my_script.js"></script>
</body>
</html>
