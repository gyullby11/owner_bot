<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - 사장봇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0f1e3f',
                        steel: '#213a56',
                        sand: '#cdaa80',
                        camel: '#997953',
                        cream: '#fcfaf8'
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Apple SD Gothic Neo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/css/my_styles.css">
</head>
<body class="bg-cream text-navy antialiased min-h-screen flex flex-col relative overflow-x-hidden">

    <div class="fixed top-[-20%] right-[-10%] w-[500px] h-[500px] bg-sand rounded-full mix-blend-multiply filter blur-[100px] opacity-20 -z-10 pointer-events-none"></div>
    <div class="fixed bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-steel rounded-full mix-blend-multiply filter blur-[100px] opacity-10 -z-10 pointer-events-none"></div>

    <header class="w-full relative z-10 py-5 px-6 lg:px-8 flex justify-between items-center max-w-[1000px] mx-auto border-b border-gray-200/50">
        <a href="/index.html" class="flex items-center gap-2">
            <div class="w-8 h-8 bg-navy rounded-lg flex items-center justify-center text-sand font-bold text-xl">S</div>
            <span class="text-2xl font-black tracking-tight text-navy">사장봇</span>
        </a>
        <div class="flex gap-4 items-center">
            <a href="/html/generate.html" class="text-steel font-bold hover:text-navy transition px-4 py-2">콘텐츠 생성</a>
            <button onclick="logout()" class="px-4 py-2 text-sm font-bold text-gray-500 hover:text-red-500 transition">로그아웃</button>
        </div>
    </header>

    <main class="flex-grow flex flex-col px-4 lg:px-8 py-8 max-w-[1000px] mx-auto w-full z-10">

        <div class="mb-8">
            <h2 class="text-3xl font-black text-navy mb-2">마이페이지</h2>
            <p class="text-steel font-medium">내 계정 정보와 과거에 생성한 콘텐츠를 확인하세요.</p>
        </div>

        <section class="glass-card p-6 md:p-8 rounded-3xl shadow-lg border border-gray-100 mb-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div id="user-info" class="flex items-center gap-4">
                <div class="w-16 h-16 bg-navy text-sand rounded-full flex items-center justify-center text-2xl font-black shadow-inner">
                    홍
                </div>
                <div>
                    <h3 class="text-xl font-bold text-navy">홍길동 사장님</h3>
                    <p class="text-gray-500">test@email.com</p>
                </div>
            </div>

            <div class="bg-gray-50 p-5 rounded-2xl border border-gray-200 w-full md:w-auto flex flex-col md:flex-row items-center gap-4 md:gap-8">
                <div class="text-center md:text-left">
                    <p class="text-sm font-bold text-gray-500 mb-1">현재 잔여 크레딧</p>
                    <div class="text-3xl font-black text-navy">3 <span class="text-lg font-medium text-gray-500">회</span></div>
                </div>
                <a href="#pricing" class="w-full md:w-auto bg-sand text-navy font-bold px-6 py-3 rounded-xl hover:bg-camel hover:text-white transition shadow-sm text-center">
                    크레딧 충전하기
                </a>
            </div>
        </section>

        <section class="glass-card p-6 md:p-8 rounded-3xl shadow-lg border border-gray-100 flex-grow">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-navy">최근 생성 기록</h3>
                <span id="history-count" class="text-sm font-bold text-gray-400 bg-gray-100 px-3 py-1 rounded-full">목록 불러오는 중...</span>
            </div>

            <div id="history-list" class="space-y-4"></div>
        </section>
    </main>

    <script src="/js/my_script.js"></script>
</body>
</html>
