name: 사장봇 CI/CD

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 3.11 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: 환경변수 설정
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> backend/.env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> backend/.env
          echo "ALGORITHM=HS256" >> backend/.env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=60" >> backend/.env
          echo "DATABASE_URL=sqlite:///./owner_bot.db" >> backend/.env
          echo "ENV=development" >> backend/.env
          echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> backend/.env
          echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> backend/.env
          echo "MAIL_FROM=${{ secrets.MAIL_FROM }}" >> backend/.env

      - name: 서버 임포트 테스트
        run: |
          cd backend
          python -c "from main import app; print('✅ 서버 임포트 성공')"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: EC2 배포
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/owner_bot
            git pull origin main
            docker-compose -f docker-compose.prod.yml down --remove-orphans
            docker-compose -f docker-compose.prod.yml build --no-cache
            docker-compose -f docker-compose.prod.yml up -d
            sleep 10
            curl http://localhost:8000/health